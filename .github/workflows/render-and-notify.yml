name: Render Card News & Notify Telegram

on:
  push:
    paths:
      - 'workspace/*.json'

jobs:
  render-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Korean fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -fv
    
      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Get changed slides.json files
        id: changed-files
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'workspace/*.json' | tr '\n' ' ')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED"

      - name: Render slides to PNG
        run: |
          mkdir -p output
          for FILE in ${{ steps.changed-files.outputs.files }}; do
            BASENAME=$(basename "$FILE" .json)
            mkdir -p "output/$BASENAME"
            echo "▶ Rendering $FILE..."
            node scripts/render.js \
              --slides "$FILE" \
              --style clean \
              --output "output/$BASENAME/"
            echo "✅ $BASENAME 렌더링 완료"
          done

      - name: Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify-telegram.js

      - name: Upload PNG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: card-news-${{ github.run_number }}
          path: output/
          retention-days: 7
